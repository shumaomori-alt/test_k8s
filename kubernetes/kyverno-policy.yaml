apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
spec:
  validationFailureAction: Enforce  # Audit（警告のみ）ではなく Enforce（ブロック）
  rules:
  - name: validate-privileged
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "Privileged containers are not allowed!"
      pattern:
        spec:
          =(containers):
          - =(securityContext):
              =(privileged): "false"

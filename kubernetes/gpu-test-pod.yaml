apiVersion: v1
kind: Pod
metadata:
  name: gpu-test-pod
  namespace: default
spec:
  # 以前設定したT4のノードセレクタを外していない場合は、ここに合わせて記述しておきます
  nodeSelector:
    accelerator: nvidia-t4
  containers:
  - name: cuda-container
    image: ubuntu:latest
    command: ["sh", "-c", "echo 'GPU Pod successfully scheduled!'; sleep 3600"]
    resources:
      limits:
        nvidia.com/gpu: "1" # ここでGPUリソースを1つ要求します

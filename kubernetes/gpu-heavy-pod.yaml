apiVersion: v1
kind: Pod
metadata:
  name: gpu-heavy-pod
  namespace: default
spec:
  nodeSelector:
    accelerator: nvidia-t4
  containers:
  - name: cuda-container
    image: ubuntu:latest
    command: ["sh", "-c", "echo 'Heavy GPU Pod started!'; sleep 3600"]
    resources:
      limits:
        nvidia.com/gpu: "2" # あえて残りの空き（1）を超える「2」を要求します

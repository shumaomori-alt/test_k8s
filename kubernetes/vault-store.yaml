apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: default
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-role"
          secretRef:
            name: "vault-sa-token"
            key: "token"
---
# SA トークンを定常的な Secret として発行（K8s 1.24+ 対策）
apiVersion: v1
kind: Secret
metadata:
  name: vault-sa-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: external-secrets-vault
type: kubernetes.io/service-account-token

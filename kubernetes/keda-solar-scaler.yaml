apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: solar-power-ai-scaler
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: green-ai-service
  minReplicaCount: 0
  maxReplicaCount: 5
  cooldownPeriod: 30
  pollingInterval: 15
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-server.monitoring.svc.cluster.local:80
      metricName: predicted_excess_energy_watts # 🌟ここをAIの予測メトリクスに変更！
      threshold: '50' # 🌟予測値が50を超えるごとに1Pod増やす設定にします
      query: sum(predicted_excess_energy_watts)

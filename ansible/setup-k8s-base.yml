---
- name: Kubernetesクラスター構築（共通基盤・containerd・K8sコンポーネント）
  hosts: k8s_cluster       # master-node と worker-node の両方が対象
  become: yes              # すべて sudo で実行
  gather_facts: yes        # 各サーバーのOS情報（Ubuntuかどうか等）を自動収集する

  tasks:
    # ----------------------------------------------------------------
    # 1. OSネットワーク・カーネル設定
    # ----------------------------------------------------------------
    - name: 1-1. br_netfilterモジュールを自動ロード設定
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        mode: '0644'

    - name: 1-2. カーネルモジュールを今すぐロード
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: 1-3. sysctlのネットワークパラメータ設定（パケット転送有効化）
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: '1'
        sysctl_file: /etc/sysctl.d/k8s.conf
        state: present
        reload: yes
      loop:
        - net.bridge.bridge-nf-call-iptables
        - net.bridge.bridge-nf-call-ip6tables
        - net.ipv4.ip_forward

    # ----------------------------------------------------------------
    # 2. containerd（コンテナランタイム）のインストール
    # ----------------------------------------------------------------
    - name: 2-1. 前提パッケージのインストール
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - apt-transport-https
          - ca-certificates
        state: present
        update_cache: yes

    - name: 2-2. Docker公式GPG鍵用のディレクトリ作成
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: 2-3. Docker公式GPG鍵のダウンロード
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: 2-4. Dockerリポジトリの追加
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: 2-5. containerdのインストール
      ansible.builtin.apt:
        name: containerd.io
        state: present
        update_cache: yes

    - name: 2-6. containerdのデフォルト設定を書き出し
      ansible.builtin.command:
        cmd: containerd config default
      register: containerd_config
      changed_when: false

    - name: 2-7. デフォルト設定ファイルを保存
      ansible.builtin.copy:
        content: "{{ containerd_config.stdout }}"
        dest: /etc/containerd/config.toml
        mode: '0644'

    - name: 2-8. SystemdCgroup を true に書き換える（k8s必須設定）
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: Restart containerd

    # ----------------------------------------------------------------
    # 3. Kubernetes（kubeadm, kubelet, kubectl）のインストール
    # ----------------------------------------------------------------
    - name: 3-1. Kubernetes公式GPG鍵のダウンロード（v1.30用）
      ansible.builtin.get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: '0644'

    - name: 3-2. Kubernetesリポジトリの追加
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
        state: present
        filename: kubernetes

    - name: 3-3. K8sコンポーネントのインストール
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: 3-4. バージョン固定（勝手にアップデートされないようにロック）
      # dpkgのホールド機能を使ってapt upgradeの対象外にします
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

  # ----------------------------------------------------------------
  # 共通ハンドラー（変更があった時だけコンテナを再起動する）
  # ----------------------------------------------------------------
  handlers:
    - name: Restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted

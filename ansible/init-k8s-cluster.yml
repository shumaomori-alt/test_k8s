---
# ==============================================================================
# パート1: マスターノードの初期化とFlannelの導入
# ==============================================================================
- name: 1. マスターノードの初期化とネットワーク設定
  hosts: masters
  become: yes

  vars:
    # 💡 あなたの一般ユーザー名をここに定義します
    ansible_normal_user: "***"

  tasks:
    - name: 1-1. クラスターが既に初期化されているかチェック
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_already_initialized

    - name: 1-2. kubeadm initを実行 (Flannel用のCIDRを指定)
      ansible.builtin.command:
        cmd: kubeadm init --pod-network-cidr=10.244.0.0/16
      when: not kubeadm_already_initialized.stat.exists
      register: kubeadm_init_output

    # ----------------------------------------------------------------
    # ✨ 改良：一般ユーザー用の ~/.kube/config 構築
    # ----------------------------------------------------------------
    - name: 1-3. 一般ユーザーのホームに .kube ディレクトリを作成
      ansible.builtin.file:
        path: "/home/{{ ansible_normal_user }}/.kube"
        state: directory
        mode: '0755'
        owner: "{{ ansible_normal_user }}"
        group: "{{ ansible_normal_user }}"

    - name: 1-4. admin.confを一般ユーザーの .kube/config にコピー
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ ansible_normal_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_normal_user }}"
        group: "{{ ansible_normal_user }}"
        mode: '0600'

    # ----------------------------------------------------------------
    - name: 1-5. Flannel (ポッド間ネットワーク) の導入
      ansible.builtin.command:
        cmd: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: true

    - name: 1-6. ワーカーノード用のjoinトークンを生成して記憶する
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: 1-7. トークンをAnsibleのメモリに一時保存 (他ノードへ共有用)
      ansible.builtin.set_fact:
        join_command: "{{ join_command_raw.stdout }}"

# ==============================================================================
# パート2: ワーカーノードをマスターに結合 (変更なし)
# ==============================================================================
- name: 2. ワーカーノードのクラスター参加
  hosts: workers
  become: yes

  tasks:
    - name: 2-1. 既にクラスターに参加済みかチェック
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_already_joined

    - name: 2-2. マスターノードから生成されたjoinコマンドを実行
      ansible.builtin.command:
        cmd: "{{ hostvars[groups['masters'][0]]['join_command'] }}"
      when: not kubelet_already_joined.stat.exists
      register: join_output

